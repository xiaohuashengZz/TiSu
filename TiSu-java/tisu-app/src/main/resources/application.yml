server:
  port: 8080

spring:
  application:
    name: tisu-server
  datasource:
    url: jdbc:mysql://localhost:3306/tisu?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: localhost
      port: 6379
      database: 0

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# JWT 配置
jwt:
  secret: TiSuSecretKey2026ForJwtTokenGenerationAndValidation
  user-expiration: 86400000    # 24小时
  admin-expiration: 86400000   # 24小时

# AI 配置
ai:
  default-url: https://api.openai.com/v1/chat/completions
  default-model: gpt-4o

logging:
  level:
    com.tisu: debug
